<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>STRAVA AI</title>
    <link rel="icon" href="/assets/strava-icon.svg" type="image/x-icon">
    <script src="https://unpkg.com/htmx.org"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Geist:wght@400;500;600&amp;family=Hanken+Grotesk:wght@600;700;800&amp;display=swap"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="/assets/heatmap.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-hotline@0.4.0/dist/leaflet.hotline.min.js"></script>
    <script src="/assets/heatmap.js"></script>
    <script>
        const STRAVA_CLIENT_ID = '{{ strava_client_id }}';
        const ATHLETES = {{ athletes | json | safe }};
    </script>
    <script src="/assets/script.js" defer></script>

</head>
<body class="bg-background text-on-background font-body-md overflow-x-hidden">
<!-- TopNavBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-background border-b border-outline-variant h-16 flex items-center px-margin-desktop w-full justify-between">
    <div class="flex items-center gap-stack-lg">
        <span class="font-display text-headline-lg font-black text-primary uppercase tracking-tighter">STRAVA AI</span>
    </div>
    <div class="flex items-center gap-stack-md">
        <button class="bg-primary text-on-primary px-6 py-2 rounded-full font-label-md hover:scale-95 duration-150 ease-in-out">
            Connect to Strava
        </button>
    </div>
</header>
<div class="flex pt-16 h-screen overflow-hidden">
    <!-- SideNavBar -->
    <aside class="hidden lg:flex flex-col p-stack-md gap-stack-sm h-[calc(100vh-64px)] w-64 bg-surface border-r border-outline-variant sticky top-16">
        <div class="mb-stack-lg px-2">
            <h2 class="font-display text-headline-md font-bold text-primary">Performance Lab</h2>
        </div>
        <nav id="nav-bar" class="flex-1 flex flex-col gap-1">
            <a onclick="navigate_to('activityFeed')"
               class="flex items-center gap-stack-sm px-stack-md py-stack-sm text-secondary hover:bg-surface-container-high rounded-lg transition-all font-label-md text-label-md"
               id="activityFeed">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span class="font-label-md">Activity Feed</span>
            </a>
            <a onclick="navigate_to('heatmaps')"
               class="flex items-center gap-stack-sm px-stack-md py-stack-sm text-secondary hover:bg-surface-container-high rounded-lg transition-all font-label-md text-label-md"
               id="heatmaps">
                <span class="material-symbols-outlined" data-icon="map">map</span>
                <span class="font-label-md">Heatmaps</span>
            </a>
            <a onclick="navigate_to('settings')"
               class="flex items-center gap-stack-sm px-stack-md py-stack-sm text-secondary hover:bg-surface-container-high rounded-lg transition-all font-label-md text-label-md"
               id="settings">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
                <span class="font-label-md">Settings</span>
            </a>
        </nav>
        <div class="mt-auto flex flex-col gap-1 pt-stack-md border-t border-outline-variant">
            <a class="flex items-center gap-3 px-4 py-2 text-secondary hover:bg-surface-container-high rounded-lg"
               href="#">
                <span class="material-symbols-outlined" data-icon="help">help</span>
                <span class="font-label-md">Support</span>
            </a>
        </div>
    </aside>
    <!-- Main Content -->
    <main id="main-area" class="flex-1 p-margin-desktop w-full flex flex-col overflow-hidden">

    </main>
    <!-- Stats Sidebar (Right-side contextual bento) -->

</div>

</body>
</html>
