<script>
    max_count = {{heat_map_data.max_count}};
    low_count = {{heat_map_data.low_count}};
    palette = {{heat_map_data.palette | json | safe}};
    frequency_colors = {{heat_map_data.frequency_colors | json | safe}};
    pts = {{heat_map_data.points | json | safe}};
</script>

<header class="flex items-center w-full px-margin-desktop py-stack-md bg-background border-b border-outline-variant z-[10000] overflow-visible">
    <form id="filters" method="get" action="/heat/map" hx-get="/heat/map" hx-target="#main-area" hx-swap="innerHTML" class="flex items-end gap-gutter ml-auto flex-wrap" hx-on::before-request="heat_map_afterSettle()">
        <input type="hidden" name="athlete_id" value="{{ athlete_id }}"/>
        <div class="flex ml-auto gap-gutter items-center relative">
            <label class="block font-label-sm text-secondary uppercase">Sport</label>
            <div class="relative">
                <button type="button" onclick="this.nextElementSibling.classList.toggle('hidden')" class="bg-surface border border-outline-variant rounded-lg py-3 px-4 font-body-md min-w-[120px] text-left">
                    {{ selected_sports.len() }} selected ▾
                </button>
                <div class="hidden absolute top-full mt-1 left-0 bg-surface border border-outline-variant rounded-lg shadow-lg z-[10000] min-w-[140px]">
                    {% for s in sport_types %}
                    <label class="flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-surface-container font-body-md">
                        <input type="checkbox" name="sport_type" value="{{ s }}" {% if selected_sports.contains(&s) %}checked{% endif %}/>
                        {{ s }}
                    </label>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="flex ml-auto gap-gutter items-center relative">
            <label class="block font-label-sm text-secondary uppercase">Map</label>
            <div class="relative">
                <button type="button" onclick="this.nextElementSibling.classList.toggle('hidden')" class="bg-surface border border-outline-variant rounded-lg py-3 px-4 font-body-md min-w-[120px] text-left">
                    {% if map_type == "frequency" %}Frequency{% endif %}{% if map_type == "heartrate" %}Heart Rate{% endif %}{% if map_type == "altitude" %}Altitude{% endif %}{% if map_type == "velocity" %}Speed{% endif %} ▾
                </button>
                <div class="hidden absolute top-full mt-1 left-0 bg-surface border border-outline-variant rounded-lg shadow-lg z-[10000] min-w-[140px]">
                    <label class="flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-surface-container font-body-md">
                        <input type="radio" name="map_type" value="frequency" {% if map_type == "frequency" %}checked{% endif %}/>
                        Frequency
                    </label>
                    <label class="flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-surface-container font-body-md">
                        <input type="radio" name="map_type" value="heartrate" {% if map_type == "heartrate" %}checked{% endif %}/>
                        Heart Rate
                    </label>
                    <label class="flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-surface-container font-body-md">
                        <input type="radio" name="map_type" value="altitude" {% if map_type == "altitude" %}checked{% endif %}/>
                        Altitude
                    </label>
                    <label class="flex items-center gap-2 px-4 py-2 cursor-pointer hover:bg-surface-container font-body-md">
                        <input type="radio" name="map_type" value="velocity" {% if map_type == "velocity" %}checked{% endif %}/>
                        Speed
                    </label>
                </div>
            </div>
        </div>
        <div class="flex ml-auto gap-gutter items-center">
            <label class="block font-label-sm text-secondary uppercase">From</label>
            <input type="date" name="date_from" value="{{ date_from }}" class="bg-surface border border-outline-variant rounded-lg py-3 px-4 focus:outline-none focus:border-primary transition-colors font-body-md"/>
        </div>
        <div class="flex ml-auto gap-gutter items-center">
            <label class="block font-label-sm text-secondary uppercase">To</label>
            <input type="date" name="date_to" value="{{ date_to }}" class="bg-surface border border-outline-variant rounded-lg py-3 px-4 focus:outline-none focus:border-primary transition-colors font-body-md"/>
        </div>
        <button type="submit" class="bg-primary text-on-primary px-stack-md py-3 rounded-lg font-label-md hover:scale-95 duration-150 ease-in-out">Apply</button>
    </form>
</header>
<!-- Map Viewport -->
<div id="map" class="flex-1 relative bg-surface-dim">

</div>
