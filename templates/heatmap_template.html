<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Polyline Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: sans-serif
        }

        #topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #333;
            color: #fff;
            font-size: 14px;
            position: relative;
            z-index: 1000
        }

        .nav-menu {
            display: flex;
            gap: 12px
        }

        .nav-menu a {
            color: #ccc;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px
        }

        .nav-menu a:hover, .nav-menu a.active {
            color: #fff;
            background: #555
        }

        #topbar select, #topbar input {
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            font-size: 13px
        }

        #topbar button {
            padding: 4px 12px;
            border-radius: 4px;
            border: none;
            background: #fc4c02;
            color: #fff;
            cursor: pointer;
            font-size: 13px
        }

        #map {
            height: calc(100% - 44px)
        }
    </style>
</head>
<body>
<div id="topbar">
    <nav class="nav-menu">
        <a href="/stravai">Home</a>
        <a href="/heat/map?athlete_id={{ athlete_id }}" class="active">Heatmap</a>
    </nav>
    <form id="filters" method="get" action="/heat/map" style="display:flex;align-items:center;gap:8px;margin-left:auto">
        <input type="hidden" name="athlete_id" value="{{ athlete_id }}"/>
        <label>Sport:
            <select name="sport_type" multiple size="1" style="min-width:100px">
                {% for s in sport_types %}
                <option value="{{ s }}" {% if selected_sports.contains(&s) %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </label>
        <label>From: <input type="date" name="date_from" value="{{ date_from }}"/></label>
        <label>To: <input type="date" name="date_to" value="{{ date_to }}"/></label>
        <button type="submit">Apply</button>
    </form>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="
https://cdn.jsdelivr.net/npm/leaflet-hotline@0.4.0/dist/leaflet.hotline.min.js
"></script>
<script>
    const pts = {{points_js | json | safe}};
    const max_count = {{max_count}};
</script>

<script src="/assets/heatmap.js" defer></script>
</body>
</html>
