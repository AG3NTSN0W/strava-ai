<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Polyline Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>html,body,#map{height:100%;margin:0}</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map=L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
    const pts = {{ points_js| json |safe }};
    const group=L.featureGroup();
    pts.forEach(p=>{
        L.circleMarker([p[0],p[1]],{radius:2,fillColor:'hsl('+p[3]+',100%,50%)',fillOpacity:0.8,stroke:false}).addTo(group);
    });
    group.addTo(map);
    map.fitBounds(group.getBounds(),{padding:[30,30]});
    const legend=L.control({position:'bottomright'});
    legend.onAdd=function(){const d=L.DomUtil.create('div');d.style.cssText='background:white;padding:8px 12px;border-radius:4px;box-shadow:0 0 4px rgba(0,0,0,.3);font:12px sans-serif';d.innerHTML='<div style=\"margin-bottom:4px\"><b>Frequency</b></div><div style=\"display:flex;align-items:center;gap:6px\"><span>Low</span><div style=\"width:120px;height:14px;border-radius:3px;background:linear-gradient(to right,hsl(240,100%,50%),hsl(180,100%,50%),hsl(120,100%,50%),hsl(60,100%,50%),hsl(0,100%,50%))\"></div><span>High</span></div>';return d;};
    legend.addTo(map);
</script>
</body>
</html>
