<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Polyline Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="/assets/heatmap.css"/>
</head>
<body>
<div id="topbar">
    <nav class="nav-menu">
        <a href="/stravai">Home</a>
        <a href="/heat/map?athlete_id={{ athlete_id }}" class="active">Heatmap</a>
    </nav>
    <form id="filters" method="get" action="/heat/map" style="display:flex;align-items:center;gap:8px;margin-left:auto">
        <input type="hidden" name="athlete_id" value="{{ athlete_id }}"/>
        <label>Sport:
            <select name="sport_type" multiple size="1" style="min-width:100px">
                {% for s in sport_types %}
                <option value="{{ s }}" {% if selected_sports.contains(&s) %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Map:
            <select name="map_type">
                <option value="frequency" {% if map_type == "frequency" %}selected{% endif %}>Frequency</option>
                <option value="heartrate" {% if map_type == "heartrate" %}selected{% endif %}>Heart Rate</option>
                <option value="altitude" {% if map_type == "altitude" %}selected{% endif %}>Altitude</option>
                <option value="velocity" {% if map_type == "velocity" %}selected{% endif %}>Speed</option>
            </select>
        </label>
        <label>From: <input type="date" name="date_from" value="{{ date_from }}"/></label>
        <label>To: <input type="date" name="date_to" value="{{ date_to }}"/></label>
        <button type="submit">Apply</button>
    </form>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="
https://cdn.jsdelivr.net/npm/leaflet-hotline@0.4.0/dist/leaflet.hotline.min.js
"></script>
<script>
    const max_count = {{heat_map_data.max_count}};
    const low_count = {{heat_map_data.low_count}};
    const palette = {{heat_map_data.palette | json | safe}};
    const frequency_colors =  {{heat_map_data.frequency_colors | json | safe}};
    const pts = {{heat_map_data.points | json | safe}};
</script>

<script src="/assets/heatmap.js" defer></script>
</body>
</html>
